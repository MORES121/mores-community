# ============================================================
# 树根杯 · 具身智能平衡重叉车挑战赛
# 默认配置文件（效率优化版）
# ============================================================

simulation:
  backend: "isaac_sim"
  timestep: 0.02
  max_steps: 5000
  render_mode: "human"

forklift:
  wheelbase: 1.2
  track_width: 0.8
  max_steering_angle: 30
  max_speed: 3.0
  max_fork_height: 2.0
  fork_lift_speed: 0.25

perception:
  camera:
    enabled: true
    width: 640
    height: 480
    fps: 30
  lidar:
    enabled: false
    range: 10.0
    num_points: 360

causal_graph:
  nodes:
    - perception_error
    - path_quality
    - fork_alignment
    - steering_angle
    - speed
    - fork_height
    - load_stability
    - collision_risk
    - task_success
  edges:
    - ["perception_error", "path_quality"]
    - ["perception_error", "fork_alignment"]
    - ["path_quality", "steering_angle"]
    - ["path_quality", "speed"]
    - ["fork_alignment", "fork_height"]
    - ["steering_angle", "load_stability"]
    - ["fork_height", "load_stability"]
    - ["speed", "collision_risk"]
    - ["load_stability", "task_success"]
    - ["collision_risk", "task_success"]

counterfactual:
  num_alternatives: 9
  rollout_steps: 60
  score_weights:
    stability: 0.35
    success_rate: 0.35
    efficiency: 0.30

controller:
  pid:
    kp: 2.5
    ki: 0.12
    kd: 0.04
  max_steering_rate: 25

logging:
  level: "INFO"
  save_decision_logs: true
  log_dir: "logs/"
